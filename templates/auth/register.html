{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="container py-5" style="max-width: 520px;">
  <div class="card shadow-sm">
    <div class="card-header text-white fw-bold" style="background-color: #002366;">
      <i class="bi bi-person-plus"></i> Create Account
    </div>
    <div class="card-body p-4">
      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-semibold">Full Name</label>
          <input type="text" name="name" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Email Address</label>
          <input type="email" name="email" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Password <span class="text-muted small">(min 6 chars)</span></label>
          <input type="password" name="password" class="form-control" required minlength="6">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Confirm Password</label>
          <input type="password" name="confirm_password" class="form-control" required>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Favourite Team</label>
          <select name="favorite_team" class="form-select">
            <option value="">— Select a team —</option>
            {% for team in teams %}
              <option value="{{ team }}">{{ FLAG_EMOJI.get(team, '') }} {{ team }}</option>
            {% endfor %}
          </select>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-bold">Create Account</button>
      </form>
      <hr>
      <p class="text-center mb-0 small">
        Already have an account? <a href="{{ url_for('auth.login') }}">Login</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
